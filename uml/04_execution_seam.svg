803">parallel_for MDRange</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="163.4131" x="669.29" y="395.7803">(espace Cuda sur GH200)</text></g><!--entity COMM--><g class="entity" data-entity="COMM" data-source-line="32" data-uid="ent0013" id="entity_COMM"><ellipse cx="240" cy="202.5" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="241.2061" x="119.397" y="230.2803">comm : my_rank / n_ranks / all_reduce</text></g><!--entity MPI--><g class="entity" data-entity="MPI" data-source-line="33" data-uid="ent0014" id="entity_MPI"><rect fill="#F4F6F8" height="34" rx="2.5" ry="2.5" style="stroke:#08519C;stroke-width:0.5;" width="44.8896" x="21.56" y="361"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="24.8896" x="31.56" y="381.7803">MPI</text></g><!--entity SOLO--><g class="entity" data-entity="SOLO" data-source-line="34" data-uid="ent0015" id="entity_SOLO"><rect fill="#F4F6F8" height="34" rx="2.5" ry="2.5" style="stroke:#08519C;stroke-width:0.5;" width="174.0889" x="100.96" y="361"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="154.0889" x="110.96" y="381.7803">serie (degenere : 1 rang)</text></g><!--entity OP--><g class="entity" data-entity="OP" data-source-line="15" data-uid="ent0002" id="entity_OP"><rect fill="#F4F6F8" height="48" rx="2.5" ry="2.5" style="stroke:#08519C;stroke-width:0.5;" width="230.8613" x="198.57" y="42"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="66.9307" x="208.57" y="62.7803">operateurs</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="210.8613" x="208.57" y="76.7803">(assemble_rhs, reflux, reductions)</text></g><!--entity IF--><g class="entity" data-entity="IF" data-source-line="17" data-uid="ent0003" id="entity_IF"><ellipse cx="378" cy="202.5" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="126.8408" x="314.5796" y="230.2803">for_each_cell(box, f)</text></g><g class="entity" data-entity="GMN19" data-source-line="41" data-uid="ent0020" id="entity_GMN19"><path d="M636.46,472 L636.46,547 A0,0 0 0 0 636.46,547 L865.5362,547 A0,0 0 0 0 865.5362,547 L865.5362,482 L855.5362,472 L755,472 L751,409.36 L747,472 L636.46,472 A0,0 0 0 0 636.46,472" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M855.5362,472 L855.5362,482 L865.5362,482 L855.5362,472" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="186.4307" x="642.46" y="487.0103">Le fonctor f est annote ADC_HD</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="165.1216" x="642.46" y="500.0103">(host + device) et ne capture</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="184.9771" x="642.46" y="513.0103">que des handles POD (Array4) :</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="208.0762" x="642.46" y="526.0103">le MEME lambda compile pour CPU</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="46.2363" x="642.46" y="539.0103">et GPU.</text></g><g class="entity" data-entity="GMN22" data-source-line="49" data-uid="ent0023" id="entity_GMN22"><path d="M483.55,165 L483.55,240 L718.447,240 L718.447,175 L708.447,165 L483.55,165" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M708.447,165 L708.447,175 L718.447,175 L708.447,165" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="213.897" x="489.55" y="180.0103">MPI est un axe SEPARE du backend</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="143.8125" x="489.55" y="193.0103">intra-noeud : on combine</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="156.3872" x="489.55" y="206.0103">MPI + Kokkos (multi-GPU),</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="179.5244" x="489.55" y="219.0103">MPI + OpenMP (CPU pur), etc.</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="182.4824" x="489.55" y="232.0103">Contrat : bit-identique np=1/2/4.</text></g><!--link OP to IF--><g class="link" data-entity-1="OP" data-entity-2="IF" data-source-line="19" data-uid="lnk4" id="link_OP_IF"><path d="M325.15,90.43 C339.83,121.29 362.3125,168.5318 371.7125,188.2918" fill="none" id="OP-to-IF" style="stroke:#444444;stroke-width:1;"/><polygon fill="#444444" points="374.29,193.71,374.0359,183.8644,372.1421,189.1949,366.8117,187.3011,374.29,193.71" style="stroke:#444444;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="125.0361" x="347" y="131.0103">appelle (code unique)</text></g><!--link IF to SER--><g class="link" data-entity-1="IF" data-entity-2="SER" data-source-line="27" data-uid="lnk9" id="link_IF_SER"><path d="M373.79,211.4 C367.56,223.57 356.18,247.83 352,270 C346.6,298.65 352.2118,326.0934 358.8718,347.8234" fill="none" id="IF-to-SER" style="stroke:#444444;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#444444" points="360.63,353.56,361.8171,343.7829,359.1648,348.7795,354.1683,346.1272,360.63,353.56" style="stroke:#444444;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="166.188" x="353" y="281.0103">ADC_HAS_KOKKOS absent</text><text fill="#000000" font-family=