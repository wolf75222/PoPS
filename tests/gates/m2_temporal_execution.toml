schema_version = 1
gate = "m2-temporal-execution"
issues = ["ADC-661", "ADC-662", "ADC-663", "ADC-664", "ADC-665", "ADC-666"]

# These are M2 dependencies, but they are not implemented by this branch.  Keeping
# them in a typed deferred section prevents this gate from being mistaken for the
# final multirate/AMR acceptance proof.
[[deferred]]
issue = "ADC-648"
requirement = "amr_step_transaction"
reason = "AMR hierarchy, regrid and distributed publication still need one atomic transaction."
close_condition = "Fault injection proves rollback of hierarchy, state, histories, caches, diagnostics and clocks on every rank."

[[deferred]]
issue = "ADC-667"
requirement = "multirate_history"
reason = "Cross-clock multirate history and restart ownership are not yet implemented."
close_condition = "A multirate run and restart preserve every clock, history edge and synchronization relation exactly."

# Every requirement has one success proof and one refusal/rollback proof. Exact
# nodeids make deletion or renaming a reviewed gate change rather than silent loss.
[[check]]
issue = "ADC-661"
requirement = "phase_pipeline"
polarity = "positive"
kind = "pytest"
target = "pipeline"
nodeid = "tests/python/integration/bindings/test_m1_scalar_advection_pipeline.py::test_scalar_advection_completes_typed_phase_pipeline"

[[check]]
issue = "ADC-661"
requirement = "phase_pipeline"
polarity = "refusal"
kind = "pytest"
