name: CI

# adc_cpp est KOKKOS-ONLY : Kokkos est le seul backend on-node (Serial / OpenMP / Cuda selon
# l'install Kokkos). Il n'existe plus de build non-Kokkos -- TOUS les jobs configurent avec
# -DPOPS_USE_KOKKOS=ON. Topologie (ADC-171) :
#  - changes : routage par chemins (dorny/paths-filter). Calcule deux drapeaux cpp / python a
#    partir des fichiers modifies pour ne lancer que le gate utile sur une pull_request. Les
#    changements docs/CI/meta publient seulement le check requis `gate`, sans compiler Kokkos,
#    sauf opt-in explicite par label `ci-kokkos` ou `ci-full`.
#  - gate-cpp + gate-python-architecture + gate-python (sur pull_request, gate OBLIGATOIRE) :
#    gate-python-architecture est source-only ; gate-cpp/gate-python sont Kokkos SERIAL, scindes et
#    tournant EN PARALLELE. gate-cpp = ctest C++ ; gate-python = module _pops + suite tests/python.
#    Avant ADC-171 c'etait UN seul job sequentiel (build C++ -> module Python -> tests Python) ;
#    le split, le sharding par duree et mold raccourcissent le chemin critique, et le routage epargne le gate
#    inutile (une PR pur-Python ne paie que gate-python + architecture). Rapides grace aux caches (Kokkos
#    installe + ccache + pip).
#  - ci-full (push master, nightly cron, workflow_dispatch, ou PR portant le label `ci-full`) :
#    ajoute MPI (+ Kokkos Serial) et Kokkos OpenMP, la suite COMPLETE. INCHANGE par ADC-171.
# Aucun test n'est supprime : seuls les declencheurs et le cache changent. Le serie passe par
# Kokkos Serial (Kokkos_ENABLE_SERIAL=ON), le multi-thread par Kokkos OpenMP (Kokkos_ENABLE_OPENMP).
#
# ADC-548 COMPLIANCE MAP -- which job PROVES each acceptance dimension (ASCII, no docs page: this
# header comment is the single source of the CI-narrative documentation).
#  (a) EXPLICIT NAMED JOBS per compliance dimension:
#      - architecture gates      -> gate-python-architecture (source-only compliance proof: it runs
#        the WHOLE tests/python/architecture dir -- package layout, import graph, public imports,
#        file-size budget, no-legacy-route, no-string-selectors, and the header include fences; a new
#        *.py dropped under architecture/ auto-enrolls, no CI edit needed).
#      - unit families           -> gate-python shards 0..N (duration-packed; tests/python/unit/**
#        via impacted selection). The shard job NAME "... shard N" is a required-check contract.
#      - codegen / manifest / cache-ABI -> gate-python-compile-cache (the dedicated DSL compile-cache
#        job: it write/verify-keys the <so>.cachekey sidecar, the manifest and the backend/ABI cache
#        key across up to 8 real native compiles).
#      - generated-program compile + bind SMOKE -> gate-python-compile-cache (the 8 real DSL native
#        compiles ARE the compile/bind smoke: emit -> .so -> load).
#      - bind-RUN / ProgramContext execution SMOKE -> kokkos-openmp (the add_native_block route:
#        test_native_abi_std / test_dsl_production / test_dsl_production_amr actually RUN a compiled
#        Program). Fast lane carries the compile-BIND proof; the full lane carries the bind-RUN proof.
#  (b) DEBUG ARTIFACTS ON CODEGEN FAILURE: the codegen-running jobs (gate-python-compile-cache and the
#      gate-python shards) export POPS_KEEP_GENERATED=1 into a known POPS_CACHE_DIR and, on failure,
#      upload the ADC-536 provenance sidecars -- the generated .cpp (banner = serialized IR + hashes +
#      flags + toolchain + REDACTED compile command) and the .cachekey -- as a debug artifact. The
#      banner is redacted and sidecar-only, so it never leaks a secret and never enters the .so bytes.
#  (c) LEGACY TESTS separated from the compliance proof: the compliance proof (gate-python-architecture)
#      is SOURCE-ONLY and never imports/executes the functional or legacy-surface tests, so it cannot
#      be contaminated. Functional tests (incl. the legacy System-coupler / reference-oracle C++
#      surface) live in the unit/integration shards and the full lanes, kept distinct BY JOB. No
#      separate legacy lane exists or is warranted today.
#  (d) SLOW MATRICES named and documented: mpi (MPI + Kokkos Serial, ctest -L mpi) and kokkos-openmp
#      (Kokkos OpenMP + the native-ABI bind-RUN route). Triggers (set-mode): the full matrix runs on
#      push-master when a build/backend path changed, on the nightly cron (03:17 UTC), on
#      workflow_dispatch, and on a PR carrying the label ci-full.
on:
  # The release workflow calls this exact matrix for the tagged commit.  A tag therefore cannot
  # publish merely because the macOS wheel is healthy while one of the declared Linux source
  # routes (Serial, OpenMP, or MPI) is broken.
  workflow_call:
    inputs:
      force_full:
        description: Run the complete Serial, OpenMP, and MPI source matrix.
        required: false
        default: false
        type: boolean
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'tutorials/**'
      - '.gitignore'
  pull_request:
    # Types par defaut (opened, synchronize, reopened) PLUS labeled : poser le label
    # `ci-kokkos` ou `ci-full` sur une PR re-declenche le workflow. Sans `labeled`, ajouter
    # un label ne relance aucun run.
    types: [opened, synchronize, reopened, labeled]
    # NO paths-ignore on pull_request: the `gate` job is a REQUIRED status check (branch
    # protection on master). A required check that never runs blocks the PR forever, so the
    # workflow must trigger on EVERY PR to report `gate`. The internal routing (the `changes`
    # job + per-job `if:`) still skips the expensive Kokkos builds for doc/CI/meta-only PRs,
    # so the gate just reports fast. The `push` trigger keeps its paths-ignore (no gate needed there).
  schedule:
    # Suite complete chaque nuit (03:17 UTC) meme sans push, pour attraper toute
    # derive d'environnement (image runner, deps apt) hors du chemin critique des PR.
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  # Sur une PR, un nouveau push annule le run precedent encore en vol : on n'immobilise
  # pas les runners lents sur une revision deja perimee.
  # Sur un push master (et nightly/dispatch), on n'annule PAS : des merges rapproches se
  # couperaient mutuellement leurs builds Kokkos lents (interruption SIGTERM, exit 143),
  # marquant master en faux rouge alors que le code est sain. Chaque validation post-merge
  # va donc a son terme (les runs se mettent en file au lieu de s'annuler).
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  # dorny/paths-filter lit la liste des fichiers modifies de la PR via l'API (pull-requests: read)
  # et le code est recupere par checkout (contents: read). Aucun job n'ecrit quoi que ce soit :
  # pas de permission en ecriture accordee.
  contents: read
  pull-requests: read

jobs:
  # Routage par chemins : calcule des drapeaux (cpp / python / python_arch) a partir des fichiers modifies, pour
  # ne payer que le gate pertinent sur une pull_request. Sur push (et tout evenement non-PR), les
  # gates tournent de toute facon -- ces drapeaux ne servent qu'a court-circuiter le gate non
  # concerne sur une PR (une PR pur-Python lance gate-python + architecture, pas gate-cpp).
  changes:
    name: routage (chemins modifies)
    runs-on: ubuntu-latest
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      python: ${{ steps.filter.outputs.python }}
      python_arch: ${{ steps.filter.outputs.python_arch }}
      mpi: ${{ steps.filter.outputs.mpi }}
      full: ${{ steps.filter.outputs.full }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            cpp:
              - 'include/**'
              - 'tests/*.cpp'
              - 'tests/*.hpp'
              - 'tests/**/*.cpp'
              - 'tests/**/*.hpp'
              - 'tests/CMakeLists.txt'
              - 'tests/cpp/test_sources.cmake'
              - 'tests/cpp/test_durations.json'
              - 'tests/test_manifest.toml'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'src/**'
              - 'python/bindings/**/*.cpp'
              - 'python/bindings/**/*.hpp'
              - 'python/CMakeLists.txt'
              - 'scripts/gen_solver_kernel.py'
              - 'scripts/ci_select_tests.py'
              - 'scripts/ci_shard_binpack.py'
              - 'scripts/ci_include_graph.py'
              - 'scripts/ci_route_mode.py'
              - '.github/actions/setup-kokkos/**'
              - '.github/workflows/ci.yml'
            python:
              - 'python/**'
              - 'tests/python/**'
              - 'tests/python/test_durations.json'
              - 'tests/test_manifest.toml'
              - 'pyproject.toml'
              - 'scripts/gen_solver_kernel.py'
              - 'scripts/ci_select_tests.py'
              - 'scripts/ci_shard_binpack.py'
              - 'scripts/ci_import_closure.py'
              - 'scripts/ci_route_mode.py'
              - '.github/actions/setup-kokkos/**'
              - '.github/workflows/ci.yml'
            python_arch:
              - 'tests/python/architecture/**'
              - 'schemas/**'
              - 'pyproject.toml'
              - 'environment.yml'
              - 'CMakeLists.txt'
              - 'CHANGELOG.md'
              - 'README.md'
              - 'docs/VERSIONING.md'
              - 'tests/cpp/test_durations.json'
              - 'tests/test_manifest.toml'
              - 'scripts/generate_component_catalog.py'
              - 'scripts/generate_release_contract.py'
              - 'scripts/final_release_contract.py'
              - 'scripts/release_preflight.py'
              - 'scripts/run_final_gate.py'
              - 'scripts/check_packaging_manifest.py'
              - 'scripts/ci_import_closure.py'
              - 'scripts/ci_include_graph.py'
              - 'scripts/ci_select_tests.py'
              - 'scripts/ci_shard_binpack.py'
              - 'scripts/ci_route_mode.py'
              - '.github/actions/**'
              - '.github/workflows/**'
            # Une modification du chemin distribue doit exercer MPI sur la PR sans dependre
            # d'un label manuel. Les changements generaux restent couverts par ci-full/nightly.
            mpi:
              - 'include/pops/parallel/**'
              - 'include/pops/runtime/**'
              - 'include/**/*mpi*'
              - 'src/runtime/**'
              - 'src/**/*mpi*'
              - 'python/bindings/**/*mpi*'
              - 'python/bindings/core/init/init_amr.cpp'
              - 'python/bindings/core/init/init_core.cpp'
              - 'python/bindings/core/init/init_system.cpp'
              # The collective proof covers the complete publication stack, not only the final
              # hdf5 adapter: snapshot/data/common/runtime-consumer changes must exercise it too.
              - 'python/pops/output/**'
              - 'python/pops/_platform_contracts.py'
              - 'python/pops/codegen/_compiled_artifact.py'
              - 'python/pops/runtime/_consumer.py'
              - 'python/pops/runtime/_consumer_effects.py'
              - 'python/pops/runtime/_consumer_planning.py'
              - 'python/pops/runtime/_consumer_transaction.py'
              - 'python/pops/runtime/_output_publisher.py'
              - 'python/pops/runtime/_runtime_consumers.py'
              - 'python/pops/runtime/_runtime_instance.py'
              - 'python/pops/runtime/_component_execution_context.py'
              - 'python/pops/runtime/_platform_manifest.py'
              - 'python/pops/runtime/_runtime_authorities.py'
              - 'python/pops/runtime/_runtime_executor.py'
              - 'python/pops/runtime/_system_unified_install.py'
              - 'python/pops/runtime_environment.py'
              - 'tests/**/mpi/**'
              - 'tests/python/integration/io/test_hdf5_parallel.py'
              - 'tests/CMakeLists.txt'
              - 'tests/test_manifest.toml'
              - 'scripts/ci_select_tests.py'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
            # Les changements de workflows/actions CI sont valides par revue + lint YAML local,
            # et ne compilent pas Kokkos par defaut. Ajouter `ci-kokkos` pour forcer les gates
            # Serial, ou `ci-full` pour MPI + OpenMP.
            # full : un push master ne lance la suite COMPLETE (MPI + Kokkos OpenMP) que si un
            # chemin build/backend a bouge. Conservateur a dessein -- couvre tout ce qui peut affecter
            # l'artefact compile OU le chemin DSL/production exerce par le job kokkos-openmp (dsl.py et
            # tests/python/**/test_dsl_production*.py inclus via tests/**).
            # Hors liste : fichiers meta seuls (autres workflows, configs linters, LICENSE). Filet de
            # securite : le run nocturne (cron) lance la suite complete inconditionnellement.
            full:
              - 'include/**'
              - 'tests/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'pyproject.toml'
              - 'python/**'
              - 'src/**'
              - 'scripts/**'

  # Autorite unique de routage. Elle calcule les gates obligatoires ET le mode complet ; chaque job
  # et l'agregateur consomment ensuite ces memes sorties, donc un drift de `if:` ne peut jamais
  # transformer un gate requis en skip passant.
  # La suite COMPLETE (MPI + Kokkos OpenMP) tourne si :
  #  - run nocturne (schedule) OU declenchement manuel (workflow_dispatch) : INCONDITIONNEL
  #    (le cron est le filet anti-derive ; le dispatch, l'override de l'integrateur), OU
  #  - push sur master ET un chemin build/backend a bouge (needs.changes.outputs.full) : un push ne
  #    touchant QUE des fichiers meta (autres workflows, configs linters, LICENSE) saute MPI/OpenMP
  #    -- la prochaine execution nocturne les rejoue de toute facon, OU
  #  - PR portant le label `ci-full` (l'integrateur exige la validation MPI/Kokkos OpenMP avant merge).
  # Sinon (PR ordinaire) : gate rapide seul (Kokkos Serial : C++ + Python).
  set-mode:
    name: mode (fast/full)
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      full: ${{ steps.decide.outputs.full }}
      cpp_required: ${{ steps.decide.outputs.cpp_required }}
      python_required: ${{ steps.decide.outputs.python_required }}
      architecture_required: ${{ steps.decide.outputs.architecture_required }}
      mpi_required: ${{ steps.decide.outputs.mpi_required }}
      openmp_required: ${{ steps.decide.outputs.openmp_required }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - id: decide
        env:
          CPP_PATHS: ${{ needs.changes.outputs.cpp }}
          PYTHON_PATHS: ${{ needs.changes.outputs.python }}
          ARCHITECTURE_PATHS: ${{ needs.changes.outputs.python_arch }}
          MPI_PATHS: ${{ needs.changes.outputs.mpi }}
          FULL_PATHS: ${{ needs.changes.outputs.full }}
          CI_KOKKOS: ${{ contains(github.event.pull_request.labels.*.name, 'ci-kokkos') }}
          CI_FULL: ${{ contains(github.event.pull_request.labels.*.name, 'ci-full') }}
          FORCE_FULL: ${{ inputs.force_full || false }}
        run: |
          python3 scripts/ci_route_mode.py decide \
            --event-name "${{ github.event_name }}" \
            --cpp-paths "$CPP_PATHS" \
            --python-paths "$PYTHON_PATHS" \
            --architecture-paths "$ARCHITECTURE_PATHS" \
            --mpi-paths "$MPI_PATHS" \
            --full-paths "$FULL_PATHS" \
            --ci-kokkos "$CI_KOKKOS" \
            --ci-full "$CI_FULL" \
            --force-full "$FORCE_FULL" \
            --github-output "$GITHUB_OUTPUT"

  # GATE C++ (ADC-171). Les cibles selectionnees sont partitionnees en six shards deterministes
  # dont l'union est verifiee par ci_select_tests.py avant exposition au workflow. Chaque shard
  # construit TOUJOURS ses cibles explicites (meme en mode all) puis applique la regex CTest du meme
  # shard : l'ensemble des executables n'est plus sur le chemin critique d'un runner unique.
  gate-cpp-shards:
    name: ubuntu-latest / Kokkos Serial (C++) shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, set-mode]
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    # Tout evenement non-PR (push master / nightly / dispatch) lance le gate ; sur pull_request,
    # uniquement si un chemin C++ a bouge, ou si un label force explicitement Kokkos.
    if: needs.set-mode.outputs.cpp_required == 'true'

    env:
      # Un cache par shard, borne a 512 Mo : 3 Go maximum par generation. Chaque shard ne construit
      # qu'environ un sixieme des cibles, ce qui evite le thrashing du cache monolithique.
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 512M
      # ADC-366 ccache cross-run/cross-checkout hit-rate (codegen-neutral, keys unchanged; paired with
      # -ffile-prefix-map on the cmake line below).
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "true"
      CCACHE_SLOPPINESS: locale,time_macros
      # Cle exacte unique par tentative : cache/save peut persister le travail partiel d'un shard
      # apres echec/annulation. Les restore prefixes restent limites au MEME shard (PR puis master) ;
      # aucun fallback vers l'ancien cache monolithique de 1.3 Go, qui serait duplique six fois.
      # `runner.*` is unavailable in job-level env expressions. Keep the portable suffix here and
      # add the runner OS only at the cache steps, where that context is authenticated by Actions.
      CCACHE_CACHE_KEY: kokkos-serial-shard-${{ matrix.shard }}-${{ github.ref }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
      # Prefixe FIXE ou Kokkos est installe par l'action composite (meme chemin que kokkos-prefix) ;
      # mis en cache (le gros gain : pas de reconstruction de Kokkos a chaque run). Serial, PIC.
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Changed files for test selection
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "$GITHUB_SHA" > "$RUNNER_TEMP/changed-files.txt"
          else
            git ls-files > "$RUNNER_TEMP/changed-files.txt"
          fi
          echo "path=$RUNNER_TEMP/changed-files.txt" >> "$GITHUB_OUTPUT"

      - name: Select affected C++ tests
        id: test-plan
        run: |
          force_args=()
          if [ "${{ github.event_name }}" = "pull_request" ] \
             && { [ "${{ contains(github.event.pull_request.labels.*.name, 'ci-kokkos') }}" = "true" ] \
                  || [ "${{ contains(github.event.pull_request.labels.*.name, 'ci-full') }}" = "true" ]; }; then
            force_args+=(--force-all)
          fi
          python3 scripts/ci_select_tests.py cpp \
            --changed-files "${{ steps.changed-files.outputs.path }}" \
            --explain-file "$RUNNER_TEMP/cpp-test-plan.json" \
            --github-output "$GITHUB_OUTPUT" \
            --shard-index "${{ matrix.shard }}" \
            --shard-total 6 \
            "${force_args[@]}"
          cpp_summary=$(grep '^cpp_summary=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          cpp_shard_summary=$(grep '^cpp_shard_summary=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          cpp_areas=$(grep '^cpp_areas=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          {
            echo "### affected C++ tests"
            echo ""
            echo "- ${cpp_summary}"
            echo "- ${cpp_shard_summary}"
            echo "- areas: ${cpp_areas}"
            echo "- plan: artifact \`gate-cpp-test-plan-shard-${{ matrix.shard }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload C++ test plan
        uses: actions/upload-artifact@v7
        with:
          name: gate-cpp-test-plan-shard-${{ matrix.shard }}
          path: ${{ runner.temp }}/cpp-test-plan.json

      # Action composite : apt deps (Eigen / Ninja / ccache) + mold, et install Kokkos Serial PIC
      # MISE EN CACHE sous la cle Kokkos image/architecture/GCC exacte -- IDENTIQUE aux jobs full
      # et a quality.yml sur le meme toolchain. mold (editeur de liens rapide) n'est
      # ajoute qu'ici via extra-apt : il n'entre PAS dans les presets (portables pour le dev local mac).
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
        with:
          extra-apt: mold

      # actions/cache est immutable. restore/save separes + cle unique par tentative permettent a
      # l'etape save sous `always()` de conserver les objets compiles avant un echec/une annulation.
      - name: Restore ccache (Kokkos Serial, shard ${{ matrix.shard }})
        id: ccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ env.CCACHE_CACHE_KEY }}
          restore-keys: |
            ccache-${{ runner.os }}-kokkos-serial-shard-${{ matrix.shard }}-${{ github.ref }}-
            ccache-${{ runner.os }}-kokkos-serial-shard-${{ matrix.shard }}-refs/heads/master-

      - name: Reset ccache stats (Kokkos Serial, shard ${{ matrix.shard }})
        run: ccache --zero-stats

      # Flags du build : CMakePresets.json (preset ci-kokkos) = SOURCE UNIQUE DE VERITE, partagee
      # avec le dev local ; Kokkos_ROOT vient de $KOKKOS_PREFIX (install en cache ci-dessus) et
      # ccache est auto-detecte par le CMakeLists (POPS_USE_CCACHE). Le preset pose aussi
      # POPS_TESTS_FAST_O0=ON : sous Kokkos, l'inlining -O3 des foncteurs device dans les ~242
      # cibles de test rendait le build du gate enorme. Les tests sont des controles de correction
      # sur grilles minuscules -> compiles a -O0 (build rapide ; la lib de production et _pops restent
      # a -O3) ; le pool Ninja pops_heavy_test_tu=2 borne explicitement les TU runtime/tests -O0 sans
      # relever la concurrence du pool pops_heavy_module_tu=1 reserve au module de production
      # (cf. tests/CMakeLists.txt). Parallelisme jobs: 4 (runner public = 4 vCPU) dans les presets.
      # CMAKE_LINKER_TYPE=MOLD : mold pose en -D ICI uniquement (hors presets, cf. extra-apt mold).
      # SECONDS chronometre configure+build puis tests, ecrits dans GITHUB_STEP_SUMMARY (baseline ADC-171).
      - name: Configure + build + test (Kokkos Serial)
        run: |
          SECONDS=0
          # -ffile-prefix-map (ADC-366): codegen-neutral path rewrite for ccache cross-checkout hits (see
          # gate-python). CI-only -D; abi_key (compiler+header-content hash) untouched.
          cmake --preset ci-kokkos -DCMAKE_LINKER_TYPE=MOLD \
            -DCMAKE_CXX_FLAGS="-ffile-prefix-map=${{ github.workspace }}=."
          read -r -a cpp_targets <<< "${{ steps.test-plan.outputs.cpp_shard_targets }}"
          if [ "${#cpp_targets[@]}" -eq 0 ]; then
            echo "No affected C++ tests selected for shard ${{ matrix.shard }}."
            exit 0
          fi
          cmake --build --preset ci-kokkos --target "${cpp_targets[@]}"
          build_s=$SECONDS
          SECONDS=0
          # GTest exposes CTest names such as BrickCatalog.EntryRoundTrips, which do not
          # necessarily start with their build target. Select through the target label installed
          # by pops_add_gtest_suite so every discovered case of every built target runs exactly once.
          # Inventory CTest once and fail target-by-target before execution: a missing/malformed
          # target label must never turn this shard into a false-green "No tests were found" run.
          ctest_inventory="$RUNNER_TEMP/ctest-shard-${{ matrix.shard }}.json"
          ctest --preset ci-kokkos -N --show-only=json-v1 > "$ctest_inventory"
          python3 scripts/ci_select_tests.py verify-cpp-target-labels \
            --ctest-json "$ctest_inventory" \
            --targets "${cpp_targets[@]}"
          ctest --preset ci-kokkos -L '${{ steps.test-plan.outputs.cpp_shard_label_regex }}'
          test_s=$SECONDS
          {
            echo "### gate-cpp (Kokkos Serial, C++)"
            echo ""
            echo "| Phase | Duree (s) |"
            echo "| --- | --- |"
            echo "| configure + build | ${build_s} |"
            echo "| tests (ctest) | ${test_s} |"
            echo "| selection | ${{ steps.test-plan.outputs.cpp_summary }} |"
            echo "| shard | ${{ steps.test-plan.outputs.cpp_shard_summary }} |"
            echo ""
            echo "Hit-rate ccache :"
            echo '```'
            ccache -s | grep -i hits || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: ccache stats (Kokkos Serial, shard ${{ matrix.shard }})
        if: ${{ always() && steps.kokkos.outcome == 'success' }}
        run: ccache -s

      - name: Save ccache (Kokkos Serial, shard ${{ matrix.shard }})
        if: ${{ always() && steps.kokkos.outcome == 'success' }}
        uses: actions/cache/save@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ env.CCACHE_CACHE_KEY }}

  # Check historique stable pour la branch protection et l'agregateur global. Le resultat d'un
  # job matrix est agrege par GitHub : un seul shard en echec/timeout/annulation fait echouer ce
  # verdict ; un matrix skippe par le routage reste un succes explicite.
  gate-cpp:
    name: ubuntu-latest / Kokkos Serial (C++)
    runs-on: ubuntu-latest
    needs: [changes, set-mode, gate-cpp-shards]
    if: always()
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Verdict C++ shards
        run: |
          python3 scripts/ci_route_mode.py check \
            --gate changes "${{ needs.changes.result }}" true \
            --gate set-mode "${{ needs.set-mode.result }}" true \
            --gate gate-cpp-shards "${{ needs.gate-cpp-shards.result }}" \
              "${{ needs.set-mode.outputs.cpp_required }}"

  # GATE PYTHON ARCHITECTURE : tests source-only (pas de _pops, pas de Kokkos). Ils couvrent les
  # invariants de structure du package Python et doivent rester legers meme quand seule l'architecture
  # de tests change.
  # ADC-548 (a)(c): this job IS the architecture COMPLIANCE PROOF. It runs the whole
  # tests/python/architecture dir wholesale -- package layout (test_package_layout.py), import graph
  # (test_import_graph.py) + public imports, the 500-line file-size budget (test_file_sizes.py),
  # no-legacy-route (test_no_legacy_runtime_routes.py), no-string-selectors
  # (test_lib_time_no_string_selectors.py) and the header include fences (e.g. the schur / quarantined
  # header no-leak fences). A new *.py under architecture/ auto-enrolls (the pytest call is wholesale),
  # so the proof grows without a CI edit. Source-only: it never imports _pops nor executes the
  # functional / legacy-surface tests, so the compliance proof cannot be contaminated by them.
  gate-python-architecture:
    name: ubuntu-latest / Python architecture
    runs-on: ubuntu-latest
    needs: [changes, set-mode]
    if: needs.set-mode.outputs.architecture_required == 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Spec 4 architecture tests
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          # numpy: a hard dependency of the package that pyright must RESOLVE now that the
          # ADC-628 include list covers all of python/pops (the tests themselves stay source-only).
          pip install --upgrade pip pytest pyright numpy
          python3 -m pytest tests/python/architecture -q

      - name: M2 temporal gate manifest
        run: python3 scripts/run_m2_gate.py --check-only

      - name: Generated component catalog
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: python3 scripts/generate_component_catalog.py --check

      - name: Pyright
        run: pyright

  # GATE PYTHON BUILD : construit UNE SEULE FOIS le module _pops partage par les shards de tests.
  # Les tests DSL compilent encore leurs loaders/.so a runtime dans chaque shard, mais le gros build
  # pybind11 n'est plus multiplie par le nombre de shards.
  gate-python-build:
    name: ubuntu-latest / Kokkos Serial (Python build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, set-mode]
    # Tout evenement non-PR lance le gate ; sur pull_request, des qu'un chemin C++ (cpp) OU Python
    # (python) a bouge -- une PR pur-Python paie ce job + architecture, pas gate-cpp. Le label
    # `ci-kokkos` force aussi ce gate pour valider l'infra Kokkos sans passer en full.
    if: needs.set-mode.outputs.python_required == 'true'

    env:
      # ccache dedie au module Python (.ccache-py) : meme separation que l'ancien job build-and-test.
      CCACHE_DIR: ${{ github.workspace }}/.ccache-py
      CCACHE_MAXSIZE: 2G
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install
      # ADC-366 ccache cross-run/cross-checkout hit-rate: rewrite workspace-absolute paths to relative
      # (BASEDIR + NOHASHDIR) and lift the few residual false misses (SLOPPINESS). Codegen-neutral; the
      # cache KEYS are unchanged. Paired with -ffile-prefix-map on the cmake configure line below.
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "true"
      CCACHE_SLOPPINESS: locale,time_macros
      # Unique per attempt so a bounded build can persist every valid object it produced, even when
      # a later step fails. Restore prefixes deliberately remain compatible with PR/master history.
      CCACHE_CACHE_KEY: python-build-${{ github.ref }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # Meme action composite que gate-cpp : apt deps + mold + Kokkos Serial PIC en cache (cle
      # partagee uniquement sur la meme image/architecture/version GCC -> aucune reuse ABI invalide).
      - id: kokkos
        uses: ./.github/actions/setup-kokkos
        with:
          extra-apt: mold

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      # Separate restore/save mirrors the C++ shards: an immutable, attempt-qualified key lets the
      # `always()` save retain valid objects from a failed build instead of throwing the work away.
      - name: Restore ccache (Python module)
        id: python-ccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ env.CCACHE_CACHE_KEY }}
          restore-keys: |
            ccache-${{ runner.os }}-python-build-${{ github.ref }}-
            ccache-${{ runner.os }}-python-build-refs/heads/master-
            ccache-${{ runner.os }}-python-${{ github.ref }}-
            ccache-${{ runner.os }}-python-refs/heads/master-
            ccache-${{ runner.os }}-python-

      # ADC-621 EVICTION GUARD for the pure-python fast path. The expensive artifact is the
      # compiled _pops.so; on a PR that touches NO .so-affecting
      # input we want to reuse it instead of recompiling. The key hashes EVERY input that can change
      # the .so, so a stale binary can never be served:
      #   * include/** + src/** + python/bindings/** -- native runtime and pybind adapter sources;
      #   * python/CMakeLists.txt + CMakeLists.txt + cmake/** + CMakePresets.json -- the build graph,
      #     compile flags and POPS_CXX_STD (the presets are the single source of the std/flags);
      #   * the Kokkos version + commit -- the .so links this exact Kokkos runtime (a bump must miss);
      #   * the exact runner image, architecture and gcc version -- the pybind ABI is toolchain-bound.
      # NO restore-keys: exact match only. A near-miss must rebuild, never reuse a stale .so. The
      # pure-Python/type source copies (build-kokkos-py/python/pops/**/*.{py,pyi} + py.typed) are NOT
      # keyed here -- they are re-synced from the PR checkout after a hit (next step), so the cache
      # serves only the binary.
      - name: Cache built module (_pops.so)
        id: modcache
        uses: actions/cache@v6
        with:
          path: build-kokkos-py/python/pops
          key: pops-module-${{ runner.os }}-${{ steps.kokkos.outputs.cache-platform }}-${{ hashFiles('include/**', 'src/**', 'python/bindings/**', 'python/CMakeLists.txt', 'CMakeLists.txt', 'cmake/**', 'CMakePresets.json') }}-kokkos4.4.01-15dc143e

      # Fast path: on an EXACT module-cache hit AND no C++/build path changed on this PR, the cached
      # .so is authoritative. Re-sync the PR's pure-Python sources over the cached copies (the .py are
      # not part of the key) and SKIP the cmake configure+build entirely.
      - name: Fast path -- reuse cached module, sync python sources
        id: fastpath
        if: ${{ github.event_name == 'pull_request' && steps.modcache.outputs.cache-hit == 'true' && needs.changes.outputs.cpp != 'true' }}
        run: |
          pip install --upgrade pip numpy pytest
          # Overwrite the (unkeyed, possibly stale) copied Python/type sources with THIS checkout.
          # -I (ignore-times) forces a content sync even if an mtime+size collision would fool the
          # default quick check; --exclude='*' protects the cached _pops*.so from --delete. Mirrors
          # the package copy while retaining .pyi stubs and the PEP 561 py.typed marker.
          rsync -aI --delete --include='*/' --include='*.py' --include='*.pyi' \
            --include='py.typed' --exclude='*' \
            python/pops/ build-kokkos-py/python/pops/
          test -n "$(find build-kokkos-py/python/pops -maxdepth 1 -name '_pops*.so' -print -quit)" \
            || { echo "::error::module cache hit but no _pops*.so present"; exit 1; }
          {
            echo "### gate-python-build (module _pops, Kokkos Serial)"
            echo ""
            echo "FAST PATH: exact module-cache hit and cpp unchanged -> reused the cached _pops.so,"
            echo "re-synced the pure-python sources, skipped the cmake build."
          } >> "$GITHUB_STEP_SUMMARY"

      # Les bindings de la lib (module `pops` : System + facades) vivent ICI. On construit l'extension
      # _pops AVEC Kokkos (preset ci-kokkos-python, jobs: 4 ; CMAKE_LINKER_TYPE=MOLD en -D ici uniquement).
      # Saute UNIQUEMENT sur le fast-path : PR + hit module-cache EXACT + cpp inchange (le .so cache
      # fait autorite). Tout push master / nightly / dispatch reconstruit inconditionnellement (le
      # fast-path est borne a pull_request : le filet post-merge reste intact). La condition est la
      # NEGATION EXACTE du fast-path (les deux `if:` couvrent tous les cas sans chevauchement), donc
      # exactement l'un des deux tourne et le module existe toujours pour l'artefact.
      - name: Build module Python `pops` (Kokkos Serial)
        if: ${{ !(github.event_name == 'pull_request' && steps.modcache.outputs.cache-hit == 'true' && needs.changes.outputs.cpp != 'true') }}
        # The inner 14-minute watchdog leaves bounded room inside the 20-minute job for the
        # `always()` ccache save.  The step timeout is a second guard for configure/reporting.
        timeout-minutes: 16
        run: |
          pip install --upgrade pip numpy pytest
          SECONDS=0
          # -ffile-prefix-map (ADC-366): rewrite the workspace-absolute __FILE__/debug paths the compiler
          # bakes into objects to relative, so ccache hits across checkouts/shards. Codegen-neutral (only
          # embedded path strings change; instructions/symbols identical) -> the abi_key (compiler+header
          # content hash) is untouched. CI-only -D, mirroring -DCMAKE_LINKER_TYPE=MOLD (presets stay clean).
          # POPS_HEAVY_MODULE_TU_POOL=4 (ADC-621): use the public Linux runner's four compile slots.
          # Keeping the old value 2 serialized half of the generated-seam leaves and exceeded this
          # job's 20-minute contract even with useful ccache hits. This override remains guarded by the
          # 14-minute build watchdog and the attempt cache below; the CMake default stays the conservative
          # size-1 OOM guard and wheel builders keep their platform-specific bounded pools.
          cmake --preset ci-kokkos-python -DCMAKE_LINKER_TYPE=MOLD \
            -DPOPS_HEAVY_MODULE_TU_POOL=4 \
            -DCMAKE_CXX_FLAGS="-ffile-prefix-map=${{ github.workspace }}=."
          set +e
          timeout --signal=TERM --kill-after=30s 14m \
            cmake --build --preset ci-kokkos-python
          build_status=$?
          set -e
          build_s=$SECONDS
          {
            echo "### gate-python-build (module _pops, Kokkos Serial)"
            echo ""
            echo "| Phase | Duree (s) |"
            echo "| --- | --- |"
            echo "| configure + build | ${build_s} |"
            echo ""
            echo "Hit-rate ccache :"
            echo '```'
            ccache -s | grep -i hits || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ $build_status -eq 124 ]]; then
            echo "::error::Python native build exceeded its 14-minute cache-safe watchdog"
          fi
          exit "$build_status"

      - name: ccache stats (Python module)
        if: ${{ always() && steps.kokkos.outcome == 'success' }}
        run: ccache -s

      - name: Save ccache (Python module)
        if: ${{ always() && steps.kokkos.outcome == 'success' }}
        uses: actions/cache/save@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ env.CCACHE_CACHE_KEY }}

      - name: Upload Python module artifact
        uses: actions/upload-artifact@v7
        with:
          name: gate-python-build-kokkos-py
          path: build-kokkos-py/python/**
          if-no-files-found: error
          retention-days: 1

      - name: ccache stats (Python module build)
        if: always()
        run: ccache -s

  # GATE PYTHON (ADC-366). La suite tests/python est shardee en N legs, mais consomme l'artefact
  # _pops construit par gate-python-build au lieu de reconstruire le module dans chaque shard.
  gate-python:
    name: ubuntu-latest / Kokkos Serial (Python) shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, set-mode, gate-python-build]
    if: needs.set-mode.outputs.python_required == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Shard ids MUST stay contiguous 0..N-1: the harness pairs SHARD_INDEX=matrix.shard with
        # SHARD_TOTAL=strategy.job-total. ADC-623: files are packed by MEASURED DURATION
        # (scripts/ci_shard_binpack.py, greedy LPT over tests/python/test_durations.json), not by a
        # modulo of the file list, so the slowest shard -- the gate critical path -- is minimized.
        # 5 shards (was 3): the ADC-621 cached _pops.so makes the marginal shard cheap. To rebalance,
        # change the COUNT here only (job names stay "... shard N"; the required `gate` aggregates
        # them via a single matrix entry in its `needs`).
        shard: [0, 1, 2, 3, 4]

    env:
      # ccache reste utile aux tests DSL qui compilent des loaders/.so a runtime dans chaque shard.
      CCACHE_DIR: ${{ github.workspace }}/.ccache-py
      CCACHE_MAXSIZE: 2G
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "true"
      CCACHE_SLOPPINESS: locale,time_macros
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: ${{ strategy.job-total }}
      # ADC-548 (b): pin the DSL .so cache to a KNOWN dir and keep the generated source so a codegen
      # failure in a shard's DSL tests leaves the ADC-536 provenance sidecars (<so>.cpp + <so>.cachekey)
      # on disk for the on-failure upload. Setting POPS_CACHE_DIR here just relocates the default cache
      # (~/.cache/pops/dsl) to a workspace path; POPS_KEEP_GENERATED=1 persists the inert (sidecar-only,
      # redacted) banner .cpp -- neither changes the compiled .so bytes nor the cache key.
      POPS_CACHE_DIR: ${{ github.workspace }}/.pops-dsl-cache
      POPS_KEEP_GENERATED: "1"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Changed files for test selection
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "$GITHUB_SHA" > "$RUNNER_TEMP/changed-files.txt"
          else
            git ls-files > "$RUNNER_TEMP/changed-files.txt"
          fi
          echo "path=$RUNNER_TEMP/changed-files.txt" >> "$GITHUB_OUTPUT"

      - name: Select affected Python tests
        id: test-plan
        run: |
          force_args=()
          if [ "${{ github.event_name }}" = "pull_request" ] \
             && { [ "${{ contains(github.event.pull_request.labels.*.name, 'ci-kokkos') }}" = "true" ] \
                  || [ "${{ contains(github.event.pull_request.labels.*.name, 'ci-full') }}" = "true" ]; }; then
            force_args+=(--force-all)
          fi
          python3 scripts/ci_select_tests.py python \
            --changed-files "${{ steps.changed-files.outputs.path }}" \
            --explain-file "$RUNNER_TEMP/python-test-plan.json" \
            --tests-file "$RUNNER_TEMP/python-tests.txt" \
            --shard-index "$SHARD_INDEX" \
            --shard-total "$SHARD_TOTAL" \
            --github-output "$GITHUB_OUTPUT" \
            "${force_args[@]}"
          echo "tests_file=$RUNNER_TEMP/python-tests.txt" >> "$GITHUB_OUTPUT"
          python_summary=$(grep '^python_summary=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          python_areas=$(grep '^python_areas=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)
          {
            echo "### affected Python tests"
            echo ""
            echo "- ${python_summary}"
            echo "- areas: ${python_areas}"
            echo "- plan: artifact \`gate-python-test-plan-shard-${{ matrix.shard }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Python test plan
        uses: actions/upload-artifact@v7
        with:
          name: gate-python-test-plan-shard-${{ matrix.shard }}
          path: ${{ runner.temp }}/python-test-plan.json

      # ADC-623 SAFETY: reconstruct EVERY shard from the same selection and fail loudly unless
      # they exactly cover it (minus the dedicated compile-cache file). This catches a broken
      # duration binpacking BEFORE any test runs, so a rebalance can never silently drop or
      # duplicate a test file. Cheap (source-only, no build) and runs in every shard job.
      - name: Verify shard partition is exact
        run: |
          force_args=()
          if [ "${{ github.event_name }}" = "pull_request" ] \
             && { [ "${{ contains(github.event.pull_request.labels.*.name, 'ci-kokkos') }}" = "true" ] \
                  || [ "${{ contains(github.event.pull_request.labels.*.name, 'ci-full') }}" = "true" ]; }; then
            force_args+=(--force-all)
          fi
          python3 scripts/ci_select_tests.py verify \
            --changed-files "${{ steps.changed-files.outputs.path }}" \
            --shard-total "$SHARD_TOTAL" \
            "${force_args[@]}"

      - id: kokkos
        if: steps.test-plan.outputs.python_shard_count != '0'
        uses: ./.github/actions/setup-kokkos
        with:
          extra-apt: mold

      - uses: actions/setup-python@v6
        if: steps.test-plan.outputs.python_shard_count != '0'
        with:
          python-version: '3.12'
          cache: pip

      - name: Download Python module artifact
        if: steps.test-plan.outputs.python_shard_count != '0'
        uses: actions/download-artifact@v8
        with:
          name: gate-python-build-kokkos-py
          path: build-kokkos-py/python

      - name: Verify Python module artifact
        if: steps.test-plan.outputs.python_shard_count != '0'
        run: |
          test -d build-kokkos-py/python/pops
          test -n "$(find build-kokkos-py/python/pops -maxdepth 1 -name '_pops*.so' -print -quit)"

      - name: Cache ccache (Python runtime loaders)
        if: steps.test-plan.outputs.python_shard_count != '0'
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-python-runtime-shard${{ matrix.shard }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-python-runtime-shard${{ matrix.shard }}-${{ github.ref }}-
            ccache-${{ runner.os }}-python-runtime-shard${{ matrix.shard }}-refs/heads/master-
            ccache-${{ runner.os }}-python-build-${{ github.ref }}-
            ccache-${{ runner.os }}-python-build-refs/heads/master-
            ccache-${{ runner.os }}-python-

      - name: Test module Python `pops` shard ${{ matrix.shard }} (Kokkos Serial)
        if: steps.test-plan.outputs.python_shard_count != '0'
        run: |
          pip install --upgrade pip numpy pytest
          export PYTHONPATH="$PWD/build-kokkos-py/python"
          # PoPS est Kokkos-only : les tests DSL qui compilent un loader/.so production ou son ABI
          # incluent les en-tetes pops (-> for_each, #error sans Kokkos). Ils lisent le Kokkos a utiliser
          # via Kokkos_ROOT / POPS_KOKKOS_ROOT : on pointe le MEME Kokkos Serial que le module _pops.
          export Kokkos_ROOT="${KOKKOS_PREFIX}" POPS_KOKKOS_ROOT="${KOKKOS_PREFIX}"
          # ADC-548 (b): ensure the pinned DSL cache dir exists so any codegen sidecars land in a known
          # place for the on-failure upload (empty when this shard runs no DSL-compiling test).
          mkdir -p "$POPS_CACHE_DIR"
          SECONDS=0
          # ADC-366 sharded runner. The selected file list is produced by scripts/ci_select_tests.py,
          # then pytest owns collection, fixtures, markers and reporting.
          : "${SHARD_INDEX:=0}" "${SHARD_TOTAL:=1}"
          timings="$RUNNER_TEMP/pytimings"; mkdir -p "$timings"
          selected="${{ steps.test-plan.outputs.tests_file }}"
          if [ ! -s "$selected" ]; then
            echo "No affected Python tests selected for shard ${SHARD_INDEX}/${SHARD_TOTAL}."
            exit 0
          fi
          mapfile -t selected_tests < "$selected"
          printf '%s\n' "${selected_tests[@]}" > "$timings/selected.txt"
          set +e
          python3 -m pytest -q -ra --durations=20 "${selected_tests[@]}"
          rc=$?
          set -e
          test_s=$SECONDS
          cp "$timings/selected.txt" "$timings/timings.tsv"
          printf '{"shard":%s,"total":%s,"seconds":%s,"files":%s}\n' \
            "$SHARD_INDEX" "$SHARD_TOTAL" "$test_s" "$(wc -l < "$selected")" > "$timings/timings.json"
          {
            echo "### gate-python shard ${SHARD_INDEX}/${SHARD_TOTAL} (module _pops, Kokkos Serial)"
            echo ""
            echo "| Phase | Duree (s) |"
            echo "| --- | --- |"
            echo "| tests (python, this shard) | ${test_s} |"
            echo "| selection | ${{ steps.test-plan.outputs.python_summary }} |"
            echo ""
            echo "Selected test files (first 25):"
            echo '```'
            head -25 "$timings/selected.txt"
            echo '```'
            echo "Hit-rate ccache :"
            echo '```'
            ccache -s | grep -i hits || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: Upload per-file test timings (ADC-366)
        if: always() && steps.test-plan.outputs.python_shard_count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: gate-python-timings-shard${{ matrix.shard }}
          path: ${{ runner.temp }}/pytimings/timings.*
          if-no-files-found: ignore

      # ADC-548 (b): on a shard failure, ship any ADC-536 provenance sidecars a DSL-compiling test
      # left in POPS_CACHE_DIR (the generated .cpp banner + the .cachekey). Most shards run no codegen
      # test, so if-no-files-found: ignore keeps a non-codegen failure from turning red on an empty
      # upload. The banner is redacted and sidecar-only -- it cannot leak a secret nor alter the .so.
      - name: Upload codegen debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: codegen-debug-shard${{ matrix.shard }}
          path: |
            ${{ env.POPS_CACHE_DIR }}/**/*.cpp
            ${{ env.POPS_CACHE_DIR }}/**/*.cachekey
            ${{ env.POPS_CACHE_DIR }}/**/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: ccache stats (Python module)
        if: always() && steps.test-plan.outputs.python_shard_count != '0'
        run: ccache -s

  # GATE PYTHON COMPILE-CACHE (ADC-623). The final-lifecycle cache proof performs four deliberate
  # cold native package compilations plus exact semantic hits/misses (POPS_PROCESS_TIMEOUT = 900).
  # shard's critical path plus its per-file process-isolation overhead. Isolated here into a
  # DEDICATED job so it no longer weighs on the sharded suite (scripts/ci_shard_binpack.py
  # excludes it from the shard partition; the exactness check accounts for the exclusion).
  # The final DSL cache proof deliberately owns an isolated temporary native cache: it must prove
  # one real cold compile, an exact semantic hit and a semantic miss on every run. Persisting that
  # cache would make the miss assertion depend on previous CI history; ccache remains persisted and
  # accelerates the underlying compiler work without changing the artifact-cache semantics.
  # ADC-548 (a): this dedicated job is the CODEGEN + MANIFEST + CACHE-ABI proof AND the
  # generated-program compile/bind SMOKE -- its native compiles emit -> .so -> load,
  # exercising the write/verify of the <so>.cachekey sidecar and the backend/ABI cache key. On a
  # codegen failure it uploads the ADC-536 provenance sidecars (see the trailing failure step).
  gate-python-compile-cache:
    name: ubuntu-latest / Kokkos Serial (Python) compile-cache
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, set-mode, gate-python-build]
    if: needs.set-mode.outputs.python_required == 'true'

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache-py
      CCACHE_MAXSIZE: 2G
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "true"
      CCACHE_SLOPPINESS: locale,time_macros
      COMPILE_CACHE_TEST: tests/python/integration/mpi/test_dsl_compile_cache.py
      # `runner.temp` is likewise a step-only context. A workspace-local, ignored test temporary is
      # deterministic and remains available to the failure-artifact upload steps.
      COMPILE_CACHE_TMP: ${{ github.workspace }}/.pops-ci/compile-cache-test

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - id: kokkos
        uses: ./.github/actions/setup-kokkos
        with:
          extra-apt: mold

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Download Python module artifact
        uses: actions/download-artifact@v8
        with:
          name: gate-python-build-kokkos-py
          path: build-kokkos-py/python

      - name: Verify Python module artifact
        run: |
          test -d build-kokkos-py/python/pops
          test -n "$(find build-kokkos-py/python/pops -maxdepth 1 -name '_pops*.so' -print -quit)"

      - name: Cache ccache (Python runtime loaders)
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-python-compile-cache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-python-compile-cache-${{ github.ref }}-
            ccache-${{ runner.os }}-python-compile-cache-refs/heads/master-
            ccache-${{ runner.os }}-python-build-${{ github.ref }}-
            ccache-${{ runner.os }}-python-build-refs/heads/master-
            ccache-${{ runner.os }}-python-

      - name: Test DSL compile-cache (Kokkos Serial)
        # ADC-548 (b): POPS_KEEP_GENERATED=1 persists the ADC-536 provenance sidecar -- the generated
        # <so>.cpp (banner = serialized IR + hashes + flags + toolchain + REDACTED compile command) --
        # next to each .so in the test-owned isolated cache, alongside the <so>.cachekey.
        # The banner is inert (sidecar-only), so the .so bytes and the cache key are unchanged whether
        # this is set or not; on a codegen failure the trailing step uploads the sidecars for debug.
        env:
          POPS_KEEP_GENERATED: "1"
        run: |
          pip install --upgrade pip numpy pytest
          export PYTHONPATH="$PWD/build-kokkos-py/python"
          export Kokkos_ROOT="${KOKKOS_PREFIX}" POPS_KOKKOS_ROOT="${KOKKOS_PREFIX}"
          SECONDS=0
          set +e
          python3 -m pytest -q -ra --basetemp="$COMPILE_CACHE_TMP" "$COMPILE_CACHE_TEST"
          rc=$?
          set -e
          test_s=$SECONDS
          {
            echo "### gate-python-compile-cache: codegen + manifest + cache-ABI + generated-program compile/bind SMOKE (Kokkos Serial)"
            echo ""
            echo "| Phase | Duree (s) |"
            echo "| --- | --- |"
            echo "| tests (compile-cache) | ${test_s} |"
            echo ""
            echo "Hit-rate ccache :"
            echo '```'
            ccache -s | grep -i hits || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      # ADC-548 (b): on a codegen failure, ship the ADC-536 provenance sidecars for offline debug --
      # the generated .cpp (self-describing banner) and the .cachekey the compile persisted into
      # isolated pytest temp root. The banner uses the REDACTED compile command and lives only in the sidecar, so
      # this cannot leak a secret. if-no-files-found: ignore keeps a non-codegen failure from going red.
      - name: Upload codegen debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: codegen-debug-compile-cache
          path: |
            ${{ env.COMPILE_CACHE_TMP }}/**/*.cpp
            ${{ env.COMPILE_CACHE_TMP }}/**/*.cachekey
            ${{ env.COMPILE_CACHE_TMP }}/**/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: ccache stats (Python compile-cache)
        if: always()
        run: ccache -s

  # Agregation REQUISE : l'UNIQUE check a referencer dans la branch protection (ADC-166). Resout
  # trois faiblesses structurelles du routage par chemins (findings revue ADC-171) :
  #  (1) GitHub traite un required check SKIPPED comme PASSANT -> sans agregateur, une PR touchant
  #      uniquement des fichiers hors filtres mergerait au vert sans jamais construire ;
  #  (2) si le job `changes` echoue (action paths-filter, API), les gates sont skip en silence ->
  #      ici gate ECHOUE explicitement (routage non fiable = pas de verdict) ;
  #  (3) le nom du check reste STABLE meme si les gates sont re-decoupes plus tard.
  # Un gate skip PAR LE ROUTAGE (changes en succes) reste un succes : c'est le but du routage.
  gate:
    name: gate (agregation requise)
    runs-on: ubuntu-latest
    needs: [changes, set-mode, gate-cpp, gate-python-architecture, gate-python-build, gate-python, gate-python-compile-cache, mpi, kokkos-openmp]
    if: always()
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Verdict
        run: |
          echo "changes=${{ needs.changes.result }} set-mode=${{ needs.set-mode.result }} gate-cpp=${{ needs.gate-cpp.result }} gate-python-architecture=${{ needs.gate-python-architecture.result }} gate-python-build=${{ needs.gate-python-build.result }} gate-python=${{ needs.gate-python.result }} gate-python-compile-cache=${{ needs.gate-python-compile-cache.result }} mpi=${{ needs.mpi.result }} kokkos-openmp=${{ needs.kokkos-openmp.result }}"
          python3 scripts/ci_route_mode.py check \
            --gate changes "${{ needs.changes.result }}" true \
            --gate set-mode "${{ needs.set-mode.result }}" true \
            --gate gate-cpp "${{ needs.gate-cpp.result }}" true \
            --gate gate-python-architecture \
              "${{ needs.gate-python-architecture.result }}" \
              "${{ needs.set-mode.outputs.architecture_required }}" \
            --gate gate-python-build "${{ needs.gate-python-build.result }}" \
              "${{ needs.set-mode.outputs.python_required }}" \
            --gate gate-python "${{ needs.gate-python.result }}" \
              "${{ needs.set-mode.outputs.python_required }}" \
            --gate gate-python-compile-cache \
              "${{ needs.gate-python-compile-cache.result }}" \
              "${{ needs.set-mode.outputs.python_required }}" \
            --gate mpi "${{ needs.mpi.result }}" \
              "${{ needs.set-mode.outputs.mpi_required }}" \
            --gate kokkos-openmp "${{ needs.kokkos-openmp.result }}" \
              "${{ needs.set-mode.outputs.openmp_required }}"

  mpi:
    name: ubuntu-24.04 / MPI + Kokkos Serial + collective HDF5
    # Fixed distro release: the binary h5py/mpi4py packages and OpenMPI/HDF5
    # runtime come from one ABI-compatible Ubuntu package set.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [set-mode, changes]
    # Suite complete, ou PR qui modifie directement le chemin distribue/MPI.
    if: needs.set-mode.outputs.mpi_required == 'true'

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      KOKKOS_VERSION: 4.4.01
      KOKKOS_COMMIT: 15dc143e5f39949eece972a798e175c4b463d4b8
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-install
      # Debian/Ubuntu ships serial and MPI h5py flavours behind one loader.
      # Force the MPI flavour even for the single-process capability probe.
      H5PY_ALWAYS_USE_MPI: "1"
      # The native matrix reaches np=4 and the HDF5 proof reaches np=2 on a
      # small runner. The root switches are inert on GitHub's non-root runner
      # and keep the launcher usable in equivalent containerized CI runs.
      OMPI_MCA_rmaps_base_oversubscribe: "true"
      PRTE_MCA_rmaps_default_mapping_policy: ":oversubscribe"
      OMPI_ALLOW_RUN_AS_ROOT: "1"
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ccache libeigen3-dev libopenmpi-dev ninja-build openmpi-bin \
            pybind11-dev python3-dev python3-h5py python3-h5py-mpi python3-mpi4py \
            python3-numpy python3-pytest

      - name: Resolve runner and compiler cache identity
        id: kokkos-platform
        run: |
          image="${ImageOS:-}"
          if [ -z "$image" ]; then
            . /etc/os-release
            image="${ID}${VERSION_ID}"
          fi
          version="$(g++ -dumpfullversion -dumpversion)"
          version="$(printf '%s' "$version" | tr -c 'A-Za-z0-9._-' '-')"
          echo "key=${image}-${RUNNER_ARCH}-gcc-${version}" >> "$GITHUB_OUTPUT"

      # Meme install Kokkos Serial (PIC) que le gate, partagee uniquement si image, architecture et
      # version exacte de GCC concordent : jamais de reuse ABI entre ubuntu-latest et une autre image.
      - name: Cache Kokkos install (Serial ${{ env.KOKKOS_VERSION }})
        id: kokkos-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.KOKKOS_PREFIX }}
          key: kokkos-${{ runner.os }}-${{ steps.kokkos-platform.outputs.key }}-${{ env.KOKKOS_VERSION }}-${{ env.KOKKOS_COMMIT }}-serial-cxx20-pic

      - name: Build + install Kokkos (Serial, PIC)
        if: steps.kokkos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b "${KOKKOS_VERSION}" https://github.com/kokkos/kokkos.git /tmp/kokkos
          test "$(git -C /tmp/kokkos rev-parse HEAD)" = "${KOKKOS_COMMIT}"
          cmake -S /tmp/kokkos -B /tmp/kbuild -G Ninja -DKokkos_ENABLE_SERIAL=ON \
            -DCMAKE_INSTALL_PREFIX="${KOKKOS_PREFIX}" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build /tmp/kbuild --parallel 4 --target install

      - name: Cache ccache (MPI)
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-mpi-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-mpi-${{ github.ref }}-
            ccache-${{ runner.os }}-mpi-refs/heads/master-
            ccache-${{ runner.os }}-mpi-

      - name: Select manifest-owned MPI tests
        id: mpi-test-plan
        run: |
          mkdir -p build-mpi
          python3 scripts/ci_select_tests.py cpp-label \
            --label mpi \
            --github-output "$GITHUB_OUTPUT" \
            --explain-file build-mpi/mpi-test-plan.json
          python3 scripts/ci_select_tests.py python-mpi \
            --plan-file build-mpi/python-mpi-plan.tsv \
            --github-output "$GITHUB_OUTPUT" \
            --explain-file build-mpi/python-mpi-plan.json
          test -s build-mpi/python-mpi-plan.tsv

      - name: Configure + build (MPI + Kokkos Serial)
        # Flags : preset ci-mpi (source unique, cf. CMakePresets.json) ; Kokkos_ROOT vient de
        # $KOKKOS_PREFIX (env du job, install en cache). ccache auto-detecte.
        run: |
          cmake --preset ci-mpi \
            -DPOPS_BUILD_PYTHON=ON \
            -DPython_EXECUTABLE=/usr/bin/python3
          read -r -a mpi_targets <<< "${{ steps.mpi-test-plan.outputs.cpp_label_targets }}"
          cmake --build --preset ci-mpi --parallel 4 --target _pops "${mpi_targets[@]}"

      - name: Test (bit-identique np=1/2/4)
        # Les runners n'ont que 2-4 slots ; mpirun -np 4 a besoin d'oversubscribe.
        # OMPI_MCA_* couvre OpenMPI 4.x, PRTE_MCA_* couvre OpenMPI 5.x.
        # Les filtres sont ancres : CTest traite -L/-LE comme des regex, donc `-L mpi` attrapait
        # aussi le label `compiler`. La suite Python marquee `mpi` est exclue de ce fence C++ car son
        # launcher pytest ordinaire n'ouvre aucun monde MPI ; ses vrais entrypoints sont lances sous
        # mpiexec dans l'etape suivante, depuis le meme manifeste. Les tests serie tournent deja dans
        # gate-cpp. Le manifeste reste l'autorite exacte du nombre de lancements C++ MPI.
        run: |
          mpi_n=$(ctest --preset ci-mpi -N -L '^mpi$' -LE '^python$' | awk -F': ' '/Total Tests:/{print $2}')
          mpi_expected="${{ steps.mpi-test-plan.outputs.cpp_label_ctest_count }}"
          echo "Tests C++ MPI selectionnes : ${mpi_n:-0}/${mpi_expected:-0}"
          if [ "${mpi_n:-0}" != "${mpi_expected:-0}" ]; then
            echo "::error::Projection MPI incoherente : CTest=${mpi_n:-0}, manifeste=${mpi_expected:-0}"
            exit 1
          fi
          ctest --preset ci-mpi -L '^mpi$' -LE '^python$'

      - name: Test Python MPI contracts + native lifecycle + collective HDF5 writer
        # Assemble the exact source package around the MPI-enabled extension produced above. The
        # distro interpreter is intentional: apt's Python, mpi4py and h5py-MPI share one ABI.
        env:
          PYTHONPATH: ${{ github.workspace }}/build-mpi/python-package:${{ github.workspace }}
          POPS_INCLUDE: ${{ github.workspace }}/include
          POPS_KOKKOS_ROOT: ${{ github.workspace }}/.kokkos-install
          Kokkos_ROOT: ${{ github.workspace }}/.kokkos-install
          # The two script contracts normally self-skip on developer machines without MPI/toolchain.
          # In this dedicated lane every missing capability is a hard failure, never a green skip.
          POPS_REQUIRE_MPI_TESTS: "1"
        run: |
          rm -rf build-mpi/python-package
          mkdir -p build-mpi/python-package/pops
          cp -R python/pops/. build-mpi/python-package/pops/
          cp build-mpi/python/pops/_pops*.so build-mpi/python-package/pops/
          /usr/bin/python3 - <<'PY'
          import h5py
          from mpi4py import MPI
          import pops
          from pops import _pops

          if not h5py.get_config().mpi:
              raise SystemExit("h5py was imported without MPI support")
          if not _pops.__has_mpi__:
              raise SystemExit("collective HDF5 lifecycle requires an MPI-enabled _pops")
          if not hasattr(pops.ExecutionContext, "mpi_world"):
              raise SystemExit("installed package lacks the exact MPI execution context")
          print("h5py:", h5py.__version__, "mpi=", h5py.get_config().mpi)
          print("mpi4py:", MPI.Get_version(), MPI.get_vendor())
          print("pops:", pops.__version__, "mpi_module=", _pops.__has_mpi__)
          PY
          while IFS=$'\t' read -r mpi_ranks mpi_test; do
            test -n "$mpi_ranks" && test -f "$mpi_test"
            echo "Running Python MPI contract: ${mpi_test} (np=${mpi_ranks})"
            mpiexec -n "$mpi_ranks" /usr/bin/python3 "$mpi_test"
          done < build-mpi/python-mpi-plan.tsv
          mpiexec -n 2 /usr/bin/python3 -m pytest -q \
            tests/python/integration/io/test_hdf5_parallel.py

      - name: ccache stats (MPI)
        if: always()
        run: ccache -s

  kokkos-openmp:
    name: ubuntu-latest / Kokkos (OpenMP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: set-mode
    # Teste le backend KOKKOS avec l'espace d'execution OpenMP (CPU multi-thread). Le gate
    # build-and-test couvre deja Kokkos Serial (mono-thread) ; ce job ferme le multi-thread.
    # Suite complete uniquement (push master / nightly / dispatch / PR label `ci-full`).
    if: needs.set-mode.outputs.openmp_required == 'true'

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
      # Prefixe SEPARE du Kokkos Serial pour eviter toute collision de cache.
      # Meme version de Kokkos, espace d'execution OpenMP.
      KOKKOS_VERSION: 4.4.01
      KOKKOS_COMMIT: 15dc143e5f39949eece972a798e175c4b463d4b8
      KOKKOS_PREFIX: ${{ github.workspace }}/.kokkos-openmp-install

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev ninja-build ccache

      - name: Resolve runner and compiler cache identity
        id: kokkos-platform
        run: |
          image="${ImageOS:-}"
          if [ -z "$image" ]; then
            . /etc/os-release
            image="${ID}${VERSION_ID}"
          fi
          version="$(g++ -dumpfullversion -dumpversion)"
          version="$(printf '%s' "$version" | tr -c 'A-Za-z0-9._-' '-')"
          echo "key=${image}-${RUNNER_ARCH}-gcc-${version}" >> "$GITHUB_OUTPUT"

      # Cache du Kokkos DEJA INSTALLE. Image, architecture et version GCC exactes interdisent une
      # reuse ABI-incompatible; "openmp" isole cette installation du cache Serial.
      - name: Cache Kokkos install (OpenMP ${{ env.KOKKOS_VERSION }})
        id: kokkos-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.KOKKOS_PREFIX }}
          key: kokkos-${{ runner.os }}-${{ steps.kokkos-platform.outputs.key }}-${{ env.KOKKOS_VERSION }}-${{ env.KOKKOS_COMMIT }}-openmp-cxx20-pic

      - name: Cache ccache (Kokkos OpenMP)
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-kokkos-openmp-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-kokkos-openmp-${{ github.ref }}-
            ccache-${{ runner.os }}-kokkos-openmp-refs/heads/master-
            ccache-${{ runner.os }}-kokkos-openmp-

      - name: Build + install Kokkos (OpenMP)
        # Reconstruit Kokkos UNIQUEMENT sur cache miss.
        # Kokkos_ENABLE_OPENMP=ON : l'exec space par defaut devient OpenMP.
        if: steps.kokkos-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b "${KOKKOS_VERSION}" https://github.com/kokkos/kokkos.git /tmp/kokkos-omp
          test "$(git -C /tmp/kokkos-omp rev-parse HEAD)" = "${KOKKOS_COMMIT}"
          cmake -S /tmp/kokkos-omp -B /tmp/kbuild-omp -G Ninja -DKokkos_ENABLE_OPENMP=ON \
            -DCMAKE_INSTALL_PREFIX="${KOKKOS_PREFIX}" -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build /tmp/kbuild-omp --parallel 4 --target install

      - name: Configure + build (backend Kokkos OpenMP)
        # MEME preset ci-kokkos que le job Serial (binaryDir build-kokkos) : seule l'install
        # Kokkos pointee par $KOKKOS_PREFIX differe ; les runners sont des machines distinctes.
        run: |
          cmake --preset ci-kokkos
          cmake --build --preset ci-kokkos

      - name: Test (ctest, backend Kokkos OpenMP)
        # OMP_NUM_THREADS=2 : le runner GitHub est petit (2 vCPU) ; sans borne,
        # Kokkos detecte le nombre de coeurs logiques et lance N threads qui se
        # battent, ce qui provoque des suites-tests lentes ou tues (OOM/timeout).
        # OMP_PROC_BIND=false : les runners GitHub ne permettent pas l'affinite
        # de threads (KMP_AFFINITY=disabled equivalent) ; sans ce flag, OpenMP peut
        # echouer avec "Cannot bind threads" sur certaines images runner.
        env:
          OMP_NUM_THREADS: "2"
          OMP_PROC_BIND: "false"
        run: ctest --preset ci-kokkos

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      # GARDE-FOU ABI std (regression GH200). Sous Kokkos le module _pops est compile en C++20
      # (POPS_CXX_STD=20, CUDA 12.x sans -std=c++23) tandis que le DSL backend="production" figeait
      # le std du modele natif a c++23 -> cles d'ABI divergentes -> add_native_block rejetait tout
      # bloc natif. Aucun job CI ne couvrait ce chemin (le modele production est compile au RUNTIME,
      # pas en CI). On construit donc ICI le module Python AVEC Kokkos (loader c++20) puis on exerce
      # les tests qui compilent un modele production et appellent add_native_block : ils echoueraient
      # avec l'ancien defaut c++23, ils passent avec le std aligne sur le loader.
      - name: Build module Python `pops` (backend Kokkos OpenMP)
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: 2G
        run: |
          pip install --upgrade pip numpy pytest
          cmake --preset ci-kokkos-python
          cmake --build --preset ci-kokkos-python

      # ADC-548 (a): this add_native_block section is the bind-RUN / ProgramContext EXECUTION smoke --
      # it compiles a production model at runtime and actually RUNS it (System + AMR) via
      # add_native_block, the counterpart to the compile/bind smoke carried on the fast gate
      # (gate-python-compile-cache). The full lane carries the bind-RUN proof; the gate lane the compile-BIND.
      - name: Test ABI natif (production -> add_native_block, std aligne sur le loader c++20)
        env:
          OMP_NUM_THREADS: "2"
          OMP_PROC_BIND: "false"
          # PARITE KOKKOS du loader runtime : le module _pops est compile AVEC Kokkos ; sans cette
          # variable, dsl.py compile le loader SANS -DPOPS_HAS_KOKKOS -> cle d'ABI kokkos=0 vs
          # kokkos=1 du module -> rejet explicite (jeton ajoute expres : cette divergence etait
          # auparavant un fallback serie MUET). Le step suit desormais la regle documentee partout :
          # exporter POPS_KOKKOS_ROOT = la racine Kokkos du build.
          POPS_KOKKOS_ROOT: ${{ env.KOKKOS_PREFIX }}
        run: |
          export PYTHONPATH="$PWD/build-kokkos-py/python"
          # Kokkos-only : ces tests compilent un loader/.so qui inclut les en-tetes pops (-> for_each).
          # Ils lisent le Kokkos via Kokkos_ROOT / POPS_KOKKOS_ROOT : MEME install Kokkos OpenMP que _pops.
          export Kokkos_ROOT="${KOKKOS_PREFIX}" POPS_KOKKOS_ROOT="${KOKKOS_PREFIX}"
          # Le test cle de regression + les suites production qui compilent un modele au runtime et
          # le branchent par add_native_block (System et AMR). Sous Kokkos, loader = c++20.
          # Le teardown est redevenu STRICT : le SIGABRT post-succes de test_dsl_production_amr
          # (issue #271, arenes statiques des loaders detruites avant les finalize hooks Kokkos)
          # est corrige a la racine (ManagedArena = singleton jamais detruit, allocator.hpp) --
          # la tolerance ciblee rc=134 est retiree, tout echec redevient fatal.
          for t in test_native_abi_std test_dsl_production test_dsl_production_amr; do
            test_path="$(find tests/python -name "$t.py" -print -quit)"
            if [ -z "$test_path" ]; then
              echo "::error::Python test $t.py not found under tests/python"
              exit 1
            fi
            echo "::group::$t"
            python3 -m pytest -q "${test_path}"
            echo "::endgroup::"
          done

      - name: ccache stats (Kokkos OpenMP)
        if: always()
        run: ccache -s
