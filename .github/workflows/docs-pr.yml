name: Docs PR

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/build_docs.sh'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs*.yml'

concurrency:
  group: docs-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  doc-pr:
    name: doc reset lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Documentation lint
        run: python docs/check_docs.py --freshness-warn-only

      - name: codespell
        continue-on-error: true
        run: |
          pip install --upgrade pip
          pip install codespell==2.4.2
          codespell docs README.md CONTRIBUTING.md

      - name: markdownlint
        continue-on-error: true
        run: npx -y markdownlint-cli2@0.22.1
