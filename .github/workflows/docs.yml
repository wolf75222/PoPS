name: Docs

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: docs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: documentation reset check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build docs
        run: bash scripts/build_docs.sh
