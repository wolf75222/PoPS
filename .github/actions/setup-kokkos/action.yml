name: 'Setup Kokkos (PIC, cached)'
description: >
  Installe les deps de build (Eigen, Ninja, ccache) et une install Kokkos PIC MISE EN CACHE (Serial
  par defaut, OpenMP en option via exec-space), puis expose son prefixe via l'output `kokkos-prefix`.
  Avec les defauts (serial + gcc) la cle de cache est IDENTIQUE a celle du gate ci.yml : elle
  inclut image runner, architecture et version exacte du compilateur pour interdire toute reuse
  ABI-incompatible. quality.yml reutilise donc le Kokkos du gate uniquement sur le meme toolchain.
  Factorise les etapes repetees par les jobs warnings / tidy / sanitizers / tsan / codeql.

inputs:
  kokkos-version:
    description: 'Version de release Kokkos a installer'
    default: '4.4.01'
  kokkos-commit:
    description: >
      Commit exact attendu pour kokkos-version. A modifier avec kokkos-version : la CI refuse un tag
      Kokkos qui ne pointe pas sur ce commit.
    default: '15dc143e5f39949eece972a798e175c4b463d4b8'
  extra-apt:
    description: 'Paquets apt supplementaires (separes par des espaces), p.ex. clang-tidy'
    default: ''
  compiler:
    description: >
      Compilateur de l'install Kokkos : gcc (defaut) ou clang. La cle inclut l'image du runner,
      son architecture et la version exacte du compilateur ; chaque toolchain produit donc une
      installation ABI-compatible distincte.
    default: 'gcc'
  exec-space:
    description: >
      Espace d'execution Kokkos host : serial (defaut) ou openmp. openmp active Kokkos_ENABLE_OPENMP
      (espace par defaut multi-thread, prioritaire sur Serial) et installe libomp-dev ; requis par le
      job tsan (sans threads, TSan ne teste rien). Cle de cache distincte (l'install differe).
    default: 'serial'

outputs:
  kokkos-prefix:
    description: 'Prefixe d''install Kokkos (a exporter en KOKKOS_PREFIX pour les presets ci-*)'
    value: ${{ steps.paths.outputs.prefix }}
  cache-platform:
    description: 'Identite exacte image/architecture/compilateur pour les caches ABI-dependants'
    value: ${{ steps.cache-platform.outputs.key }}

runs:
  using: composite
  steps:
    - id: paths
      shell: bash
      run: echo "prefix=${{ github.workspace }}/.kokkos-install" >> "$GITHUB_OUTPUT"

    - name: Install deps
      shell: bash
      run: |
        sudo apt-get update
        # exec-space=openmp : le backend OpenMP clang a besoin de libomp LLVM (libgomp gcc n'est pas
        # TSan-aware, cf. job tsan). En serial, rien de plus.
        OMP_DEP=""
        if [ "${{ inputs.exec-space }}" = "openmp" ]; then OMP_DEP="libomp-dev"; fi
        sudo apt-get install -y libeigen3-dev ninja-build ccache $OMP_DEP ${{ inputs.extra-apt }}

    - name: Resolve runner and compiler cache identity
      id: cache-platform
      shell: bash
      run: |
        case "${{ inputs.compiler }}" in
          gcc)   CXX_BIN=g++ ;;
          clang) CXX_BIN=clang++ ;;
          *) echo "unsupported Kokkos compiler: ${{ inputs.compiler }}" >&2; exit 2 ;;
        esac
        image="${ImageOS:-}"
        if [ -z "$image" ]; then
          . /etc/os-release
          image="${ID}${VERSION_ID}"
        fi
        version="$("$CXX_BIN" -dumpfullversion -dumpversion 2>/dev/null \
          || "$CXX_BIN" -dumpversion)"
        version="$(printf '%s' "$version" | tr -c 'A-Za-z0-9._-' '-')"
        echo "key=${image}-${RUNNER_ARCH}-${{ inputs.compiler }}-${version}" >> "$GITHUB_OUTPUT"

    # Avec les defauts (serial + gcc), la cle est IDENTIQUE a celle du gate ci.yml -> cache partage
    # uniquement sur la meme image/architecture/version de compilateur. Chaque execution space reste
    # isole car l'installation Kokkos differe.
    - name: Cache Kokkos install (${{ inputs.exec-space }} ${{ inputs.kokkos-version }}, ${{ inputs.compiler }})
      id: kokkos-cache
      uses: actions/cache@v6
      with:
        path: ${{ steps.paths.outputs.prefix }}
        key: kokkos-${{ runner.os }}-${{ steps.cache-platform.outputs.key }}-${{ inputs.kokkos-version }}-${{ inputs.kokkos-commit }}-${{ inputs.exec-space }}-cxx20-pic

    - name: Build + install Kokkos (${{ inputs.exec-space }}, PIC, ${{ inputs.compiler }})
      if: steps.kokkos-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        case "${{ inputs.compiler }}" in
          clang) CXX_BIN=clang++ ;;
          *)     CXX_BIN=g++ ;;
        esac
        # exec-space=openmp : active le backend OpenMP (espace host par defaut, prioritaire sur Serial)
        # -> for_each / reductions / packing fill_boundary tournent multi-thread (requis pour TSan).
        OMP_FLAG=""
        if [ "${{ inputs.exec-space }}" = "openmp" ]; then OMP_FLAG="-DKokkos_ENABLE_OPENMP=ON"; fi
        git clone --depth 1 -b ${{ inputs.kokkos-version }} https://github.com/kokkos/kokkos.git /tmp/kokkos
        test "$(git -C /tmp/kokkos rev-parse HEAD)" = "${{ inputs.kokkos-commit }}"
        cmake -S /tmp/kokkos -B /tmp/kbuild -G Ninja -DKokkos_ENABLE_SERIAL=ON $OMP_FLAG \
          -DCMAKE_INSTALL_PREFIX="${{ steps.paths.outputs.prefix }}" -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER="$CXX_BIN" \
          -DCMAKE_CXX_STANDARD=20 -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build /tmp/kbuild --parallel 4 --target install
